name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (ruff — zero violations required)
        run: uv run ruff check .

      - name: Tests + coverage gate (>=85%)
        run: uv run pytest --cov
        env:
          # Force the offline deterministic path in CI (no external API keys).
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
